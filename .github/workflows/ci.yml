name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if [ -f backend/requirements-ci.txt ]; then pip install -r backend/requirements-ci.txt; fi

      - name: Ruff lint
        run: ruff check .

      - name: Pytest smoke test
        run: pytest tests/test_smoke.py
